spring:
  application:
    name: dispatch-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/tarmac}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9094}
    consumer:
      group-id: dispatch-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.tarmac.dispatch.event.IncidentReportedEvent
        spring.json.trusted.packages: "com.tarmac.*"
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        spring.json.add.type.headers: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

tarmac:
  topics:
    incidents-reported: incidents.reported
    incidents-assigned: incidents.assigned
