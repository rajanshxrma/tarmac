services:
  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    ports:
      # host access for local tooling / running services outside compose
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  mongo:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27018}:27017"
    volumes:
      - mongodata:/data/db

  incident-service:
    build:
      context: .
      dockerfile: incident-service/Dockerfile
    ports:
      - "${INCIDENT_PORT:-8092}:8080"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  dispatch-service:
    build:
      context: .
      dockerfile: dispatch-service/Dockerfile
    ports:
      - "${DISPATCH_PORT:-8093}:8080"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      MONGO_URI: mongodb://mongo:27017/tarmac
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started

volumes:
  mongodata:
